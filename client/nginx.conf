server {
    listen 8080;  # Changed from 80 to match your compose file
    server_name _;

    client_max_body_size 4096M;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://api.iconify.design https://api.simplesvg.com https://api.unisvg.com; frame-src 'self' blob:; img-src 'self' data:; media-src 'self' blob:;";
    }
    
    location /api {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Allow long-running requests (e.g. backup restore with large ZIPs)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;

        # Disable buffering so SSE events reach the client immediately
        proxy_buffering off;
        proxy_cache off;

        # Remove all CSP headers for API
        proxy_hide_header Content-Security-Policy;
    }

    location /uploads {
        proxy_pass http://backend:5000;
        proxy_hide_header Content-Security-Policy;
    }

    location /file {
        proxy_pass http://backend:5000;
        proxy_hide_header Content-Security-Policy;
    }
}